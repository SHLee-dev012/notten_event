name: Build Docker image

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
  pull_request:
  workflow_dispatch:

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # push to GitHub Container Registry (ghcr.io)
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # --- TEMPORARY diagnostic: reproduce `npm ci` inside the exact build
      # image + toolchain and surface the real error as an annotation
      # (Docker build logs aren't accessible via the API).
      - name: Reproduce npm ci in build image (diagnostic)
        run: |
          set +e
          docker run --rm -v "$PWD":/w -w /w node:22-bookworm-slim bash -c '
            apt-get update >/dev/null 2>&1 && \
            apt-get install -y --no-install-recommends python3 build-essential ca-certificates >/dev/null 2>&1
            npm ci > /w/ci.log 2>&1
          '
          code=$?
          echo "npm ci exit code: $code"
          tail -n 60 ci.log 2>/dev/null
          if [ "$code" -ne 0 ]; then
            msg=$(tail -n 30 ci.log 2>/dev/null)
            msg="${msg//'%'/'%25'}"; msg="${msg//$'\n'/'%0A'}"; msg="${msg//$'\r'/'%0D'}"
            echo "::error title=npm ci reproduction failed::${msg}"
          fi
          exit 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Only log in / push on branch pushes & manual runs — PRs build-validate only.
      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
