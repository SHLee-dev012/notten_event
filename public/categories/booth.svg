<svg viewBox="0 0 400 225" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#161a3f"/>
      <stop offset="1" stop-color="#070811"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="32%" r="65%">
      <stop offset="0" stop-color="#818cf8" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#818cf8" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="400" height="225" fill="url(#sky)"/>
  <rect width="400" height="225" fill="url(#glow)"/>
  <!-- stars -->
  <g fill="#ffffff">
    <circle cx="50" cy="40" r="1.5" opacity=".8"/>
    <circle cx="350" cy="46" r="1.3" opacity=".7"/>
    <circle cx="300" cy="30" r="1" opacity=".6"/>
    <circle cx="90" cy="70" r="1.1" opacity=".55"/>
  </g>
  <!-- bunting flags -->
  <path d="M80 66 q120 -22 240 0" stroke="#a5b4ff" stroke-width="1.5" fill="none" opacity=".7"/>
  <g>
    <polygon points="120,64 134,64 127,76" fill="#e879f9"/>
    <polygon points="160,60 174,60 167,72" fill="#22d3ee"/>
    <polygon points="200,58 214,58 207,70" fill="#fbbf24"/>
    <polygon points="240,60 254,60 247,72" fill="#f5abf0"/>
    <polygon points="280,64 294,64 287,76" fill="#a5b4ff"/>
  </g>
  <!-- tent -->
  <polygon points="200,84 128,120 272,120" fill="#a5b4ff"/>
  <rect x="140" y="120" width="120" height="66" rx="3" fill="#c7cdff"/>
  <!-- stripes -->
  <g fill="#6366f1" opacity=".85">
    <rect x="152" y="120" width="14" height="66"/>
    <rect x="186" y="120" width="14" height="66"/>
    <rect x="220" y="120" width="14" height="66"/>
  </g>
  <rect x="128" y="118" width="144" height="6" rx="3" fill="#818cf8"/>
</svg>
