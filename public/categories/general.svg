<svg viewBox="0 0 400 225" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1c2136"/>
      <stop offset="1" stop-color="#070810"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="34%" r="65%">
      <stop offset="0" stop-color="#94a3b8" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#94a3b8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="planet" cx="38%" cy="34%" r="75%">
      <stop offset="0" stop-color="#cbd5e1"/>
      <stop offset="1" stop-color="#64748b"/>
    </radialGradient>
  </defs>
  <rect width="400" height="225" fill="url(#sky)"/>
  <rect width="400" height="225" fill="url(#glow)"/>
  <!-- stars -->
  <g fill="#ffffff">
    <circle cx="60" cy="50" r="1.5" opacity=".85"/>
    <circle cx="330" cy="44" r="1.3" opacity=".7"/>
    <circle cx="300" cy="160" r="1.1" opacity=".6"/>
    <circle cx="80" cy="150" r="1.2" opacity=".6"/>
    <circle cx="360" cy="120" r="1" opacity=".5"/>
  </g>
  <!-- ringed planet -->
  <ellipse cx="200" cy="112" rx="72" ry="20" fill="none" stroke="#c3cad9" stroke-width="4" opacity=".55"/>
  <circle cx="200" cy="112" r="34" fill="url(#planet)"/>
  <ellipse cx="200" cy="112" rx="72" ry="20" fill="none" stroke="#e2e8f0" stroke-width="4" opacity=".9"
    stroke-dasharray="120 200" transform="rotate(-8 200 112)"/>
</svg>
