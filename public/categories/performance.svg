<svg viewBox="0 0 400 225" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2a103f"/>
      <stop offset="1" stop-color="#080610"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="30%" r="65%">
      <stop offset="0" stop-color="#e879f9" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#e879f9" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="400" height="225" fill="url(#sky)"/>
  <rect width="400" height="225" fill="url(#glow)"/>
  <!-- spotlight beams -->
  <polygon points="200,10 120,225 160,225" fill="#f5abf0" opacity="0.14"/>
  <polygon points="200,10 240,225 280,225" fill="#f5abf0" opacity="0.14"/>
  <!-- stars -->
  <g fill="#ffffff">
    <circle cx="46" cy="44" r="1.6" opacity=".85"/>
    <circle cx="330" cy="38" r="1.3" opacity=".7"/>
    <circle cx="360" cy="90" r="1.1" opacity=".6"/>
    <circle cx="70" cy="120" r="1.2" opacity=".6"/>
  </g>
  <!-- sparkle star -->
  <path d="M200 55 l10 30 30 10 -30 10 -10 30 -10 -30 -30 -10 30 -10 z" fill="#ffffff"/>
  <path d="M200 72 l5 15 15 5 -15 5 -5 15 -5 -15 -15 -5 15 -5 z" fill="#f5abf0"/>
  <!-- music note -->
  <g fill="#ffffff">
    <rect x="285" y="128" width="5" height="52" rx="2"/>
    <ellipse cx="279" cy="180" rx="12" ry="9" transform="rotate(-18 279 180)"/>
    <path d="M290 128 q22 4 22 24 q-8 -14 -22 -12 z"/>
  </g>
</svg>
